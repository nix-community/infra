nav:
  - Home: index.md
  - Open Collective: open-collective.md
  - sponsors.md
  - Services:
      - continuous-integration.md
      - Faster GitHub Actions: namespace-actions.md
      - package-sets.md
      - cache.md
      - community-builders.md
      - R. RyanTM nixpkgs-update bot: update-bot.md
      - other-services.md
  - About:
      - FAQ: faq.md
      - administrators.md
      - contact.md
      - infrastructure.md
      - security.md

theme:
  variant: classic
  features:
    - content.action.edit
    - content.code.annotate
    - content.tabs.link
    - navigation.expand
    - navigation.instant
    - navigation.tracking
    - toc.integrate
  favicon: nix-community-logo.png
  logo: nix-community-logo.png
  icon:
    repo: fontawesome/brands/github

# https://github.com/zensical/docs/blob/b55e1b4c63d4c53d9da88d5b129bd50944c8d509/docs/setup/extensions/index.md?plain=1#L125
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - toc:
      permalink: true
      toc_depth: 0

# `redirects`: https://github.com/zensical/backlog/issues/23
#plugins:
#  - redirects:
#      redirect_maps:
#        "community-builder.md": "community-builders.md"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nix-community

site_name: Nix Community
site_url: https://nix-community.org
copyright: Copyright &copy; 2023 Nix community projects
repo_name: "nix-community/infra"
repo_url: https://github.com/nix-community/infra
